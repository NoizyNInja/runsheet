<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Run Sheet</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0b5fff" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    button { padding: 10px 12px; }
    .status {
      margin: 12px 0;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      white-space: pre-wrap;
      font-family: monospace;
      background: #fafafa;
    }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 6px; }
    th { background: #f4f4f4; }
    input, select { width: 100%; box-sizing: border-box; }
  </style>
</head>
<body>
  <h2>Daily Run Sheet</h2>

  <div class="actions">
    <button id="installBtn" type="button">Install</button>
    <button id="resetSwBtn" type="button">Reset SW</button>
    <button id="exportBtn" type="button">Export Excel</button>
  </div>

  <div id="swStatus" class="status">Checking service worker...</div>

  <table id="runsheet">
    <thead>
      <tr>
        <th>#</th>
        <th>Time</th>
        <th>Customer</th>
        <th>Invoice</th>
        <th>Payment</th>
        <th>Amount</th>
        <th>Job Type</th>
        <th>Vehicle</th>
        <th>Rego</th>
        <th>Inv</th>
        <th>Email</th>
      </tr>
    </thead>
    <tbody id="bodyRows"></tbody>
  </table>

  <h3 id="totalAmount">$0.00</h3>

  <script>
    const swStatus = document.getElementById("swStatus");
    const installBtn = document.getElementById("installBtn");
    const resetSwBtn = document.getElementById("resetSwBtn");
    const exportBtn = document.getElementById("exportBtn");
    const bodyRows = document.getElementById("bodyRows");

    async function showSwStatus(extra = "") {
      let regs = [];
      let controller = false;

      if ("serviceWorker" in navigator) {
        regs = await navigator.serviceWorker.getRegistrations();
        controller = !!navigator.serviceWorker.controller;
      }

      swStatus.textContent =
        (extra ? extra + "\n\n" : "") +
        "controller: " + controller + "\n" +
        "registrations: " + regs.length + "\n" +
        "scopes:\n" + (regs.map(r => r.scope).join("\n") || "(none)");
    }

    async function registerSw() {
      if (!("serviceWorker" in navigator)) {
        await showSwStatus("Service workers not supported.");
        return;
      }

      try {
        const reg = await navigator.serviceWorker.register("/runsheet/sw.js?v=13", {
          scope: "/runsheet/",
          updateViaCache: "none"
        });

        await navigator.serviceWorker.ready;
        await showSwStatus("SW registered OK:\n" + reg.scope);
      } catch (e) {
        await showSwStatus(
          "SW REGISTER FAILED:\n" +
          "name: " + (e?.name || "(none)") + "\n" +
          "message: " + (e?.message || String(e))
        );
      }
    }

    window.addEventListener("load", registerSw);

    const JOB_COUNT = 20;
    const paymentOptions = ["Account", "Cash", "Credit", "Other"];
    const jobOptions = ["DMF", "DMR", "DR", "FLY", "CLUTCH", "OTHER"];
    const vehicleOptions = ["Car", "SUV", "Ute", "Van", "Truck", "Other"];

    function makeInput(type) {
      const i = document.createElement("input");
      i.type = type;
      return i;
    }

    function makeSelect(list) {
      const s = document.createElement("select");
      list.forEach(v => {
        const o = document.createElement("option");
        o.value = v;
        o.textContent = v;
        s.appendChild(o);
      });
      return s;
    }

    function updateTotal() {
      let total = 0;
      document.querySelectorAll(".amount").forEach(i => {
        const v = parseFloat(i.value);
        if (!isNaN(v)) total += v;
      });
      document.getElementById("totalAmount").textContent =
        total.toLocaleString(undefined, { style: "currency", currency: "AUD" });
    }

    function buildRows() {
      bodyRows.innerHTML = "";
      for (let i = 1; i <= JOB_COUNT; i++) {
        const tr = document.createElement("tr");

        const tdNum = document.createElement("td");
        tdNum.textContent = i;
        tr.appendChild(tdNum);

        const time = makeInput("time");
        const customer = makeInput("text");
        const invoice = makeInput("text");
        const payment = makeSelect(paymentOptions);

        const amount = makeInput("number");
        amount.classList.add("amount");
        amount.step = "0.01";
        amount.addEventListener("input", updateTotal);

        const job = makeSelect(jobOptions);
        const vehicle = makeSelect(vehicleOptions);
        const rego = makeInput("text");
        const invoiced = makeInput("checkbox");
        const emailed = makeInput("checkbox");

        [time, customer, invoice, payment, amount, job, vehicle, rego].forEach(el => {
          const td = document.createElement("td");
          td.appendChild(el);
          tr.appendChild(td);
        });

        const tdInv = document.createElement("td");
        tdInv.appendChild(invoiced);
        tr.appendChild(tdInv);

        const tdEmail = document.createElement("td");
        tdEmail.appendChild(emailed);
        tr.appendChild(tdEmail);

        bodyRows.appendChild(tr);
      }
    }

    buildRows();

    exportBtn.addEventListener("click", () => {
      const rows = [[
        "Row","Time","Customer","Invoice","Payment","Amount","Job","Vehicle","Rego","Inv","Email"
      ]];

      const trs = document.querySelectorAll("#runsheet tbody tr");
      trs.forEach((tr, i) => {
        const cells = tr.querySelectorAll("input,select");
        rows.push([
          i + 1,
          cells[0].value,
          cells[1].value,
          cells[2].value,
          cells[3].value,
          cells[4].value,
          cells[5].value,
          cells[6].value,
          cells[7].value,
          cells[8].checked ? "YES" : "",
          cells[9].checked ? "YES" : ""
        ]);
      });

      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Run Sheet");
      XLSX.writeFile(wb, "runsheet.xlsx");
    });

    let deferredPrompt = null;

    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      deferredPrompt = e;
      showSwStatus("Install prompt captured.");
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) {
        await showSwStatus("Install prompt not available.");
        return;
      }
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
    });

    resetSwBtn.addEventListener("click", async () => {
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const r of regs) await r.unregister();
        }

        const keys = await caches.keys();
        for (const k of keys) await caches.delete(k);

        alert("Service Worker Reset");
        location.reload();
      } catch (e) {
        alert("Reset failed: " + (e.message || e));
      }
    });
  </script>
</body>
</html>
