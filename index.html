<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Run Sheet</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0b5fff" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          await navigator.serviceWorker.register("./sw.js?v=10", {
            scope: "./",
            updateViaCache: "none"
          });
        } catch (e) {
          console.log("SW failed:", e);
        }
      });
    }
  </script>

  <style>
    :root{
      --border:#d7d7d7;
      --bg:#ffffff;
      --header:#f4f6f8;
      --text:#111;
      --panel:#fafafa;
    }

    body{
      margin:16px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    h1{
      font-size:20px;
      margin:0;
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button{
      font-size:16px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:10px;
      background:#fff;
      cursor:pointer;
    }

    .table-wrap{
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      background:#fff;
    }

    .scroll{
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }

    table{
      border-collapse:separate;
      border-spacing:0;
      width:1320px;
      min-width:100%;
    }

    thead th{
      position:sticky;
      top:0;
      background:var(--header);
      z-index:2;
      font-size:14px;
      text-align:left;
      padding:10px;
      border-bottom:1px solid var(--border);
      white-space:nowrap;
    }

    tbody td{
      border-bottom:1px solid var(--border);
      padding:8px;
      vertical-align:top;
      background:#fff;
    }

    tbody tr:last-child td{
      border-bottom:none;
    }

    .rownum{
      width:52px;
      text-align:center;
      font-weight:600;
      background:#fcfcfc;
      position:sticky;
      left:0;
      z-index:1;
    }

    thead .rownum{
      z-index:3;
      background:var(--header);
    }

    input[type="text"],
    input[type="time"],
    input[type="number"],
    select{
      width:100%;
      min-width:110px;
      font-size:16px;
      padding:10px;
      border:1px solid var(--border);
      border-radius:10px;
      background:#fff;
      box-sizing:border-box;
    }

    .rego{
      text-transform:uppercase;
    }

    .tick{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100%;
    }

    input[type="checkbox"]{
      width:22px;
      height:22px;
    }

    .totals{
      margin-top:12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:var(--panel);
      padding:12px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .totals .card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      min-width:220px;
      flex:1;
    }

    .totals .label{
      font-size:12px;
      color:#666;
      margin-bottom:6px;
    }

    .totals .value{
      font-size:22px;
      font-weight:700;
    }

    .hint{
      font-size:13px;
      color:#555;
      margin-top:10px;
    }

    @media (max-width: 480px){
      body{ margin:12px; }
      h1{ font-size:18px; }
      .actions{ width:100%; }
      button{ width:100%; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Daily Run Sheet</h1>

    <div class="actions">
      <button type="button" id="installBtn">Install</button>
      <button type="button" id="resetSwBtn">Reset SW</button>
      <button type="button" id="exportBtn">Export Excel</button>
    </div>
  </div>

  <div class="table-wrap">
    <div class="scroll">
      <table id="runsheet">
        <thead>
          <tr>
            <th class="rownum">#</th>
            <th style="width:110px;">Time</th>
            <th style="width:220px;">Customer</th>
            <th style="width:130px;">Invoice</th>
            <th style="width:140px;">Payment</th>
            <th style="width:120px;">Amount</th>
            <th style="width:160px;">Job Type</th>
            <th style="width:160px;">Vehicle</th>
            <th style="width:140px;">Rego</th>
            <th style="width:90px; text-align:center;">Inv</th>
            <th style="width:90px; text-align:center;">Email</th>
          </tr>
        </thead>
        <tbody id="bodyRows"></tbody>
      </table>
    </div>
  </div>

  <div class="totals">
    <div class="card">
      <div class="label">Jobs entered</div>
      <div class="value" id="jobsCount">0</div>
    </div>

    <div class="card">
      <div class="label">Total amount</div>
      <div class="value" id="totalAmount">$0.00</div>
    </div>
  </div>

  <div class="hint">
    If Install is unavailable, tap it anyway and it will show service worker status.
  </div>

  <script>
    const JOB_COUNT = 20;
    const paymentOptions = ["Account", "Cash", "Credit", "Other"];
    const jobOptions = ["DMF", "DMR", "DR", "FLY", "CLUTCH", "OTHER"];
    const vehicleOptions = ["Car", "SUV/4WD", "Ute", "Van", "Truck", "Trailer", "Other"];

    const bodyRows = document.getElementById("bodyRows");
    const jobsCountEl = document.getElementById("jobsCount");
    const totalAmountEl = document.getElementById("totalAmount");

    function makeInput(type) {
      const el = document.createElement("input");
      el.type = type;
      return el;
    }

    function makeSelect(options) {
      const el = document.createElement("select");
      options.forEach((opt) => {
        const o = document.createElement("option");
        o.value = opt;
        o.textContent = opt;
        el.appendChild(o);
      });
      return el;
    }

    function money(n) {
      return n.toLocaleString(undefined, {
        style: "currency",
        currency: "AUD"
      });
    }

    function updateTotals() {
      let jobs = 0;
      let total = 0;

      document.querySelectorAll("#runsheet tbody tr").forEach((tr) => {
        const inputs = tr.querySelectorAll("input, select");
        const amount = parseFloat(inputs[4].value);
        const hasData = Array.from(inputs).some((el) => {
          if (el.type === "checkbox") return el.checked;
          return String(el.value || "").trim() !== "";
        });

        if (hasData) jobs++;
        if (!Number.isNaN(amount)) total += amount;
      });

      jobsCountEl.textContent = String(jobs);
      totalAmountEl.textContent = money(total);
    }

    function buildRows() {
      bodyRows.innerHTML = "";

      for (let i = 1; i <= JOB_COUNT; i++) {
        const tr = document.createElement("tr");

        const tdNum = document.createElement("td");
        tdNum.className = "rownum";
        tdNum.textContent = i;
        tr.appendChild(tdNum);

        const time = makeInput("time");
        const customer = makeInput("text");
        const invoice = makeInput("text");
        const payment = makeSelect(paymentOptions);

        const amount = makeInput("number");
        amount.step = "0.01";
        amount.classList.add("amount");

        const job = makeSelect(jobOptions);
        const vehicle = makeSelect(vehicleOptions);

        const rego = makeInput("text");
        rego.classList.add("rego");
        rego.addEventListener("input", () => {
          rego.value = rego.value.toUpperCase();
        });

        const invoiced = makeInput("checkbox");
        const emailed = makeInput("checkbox");

        [time, customer, invoice, payment, amount, job, vehicle, rego].forEach((el) => {
          const td = document.createElement("td");
          td.appendChild(el);
          tr.appendChild(td);

          if (el.tagName === "INPUT" || el.tagName === "SELECT") {
            el.addEventListener("input", updateTotals);
            el.addEventListener("change", updateTotals);
          }
        });

        const tdInv = document.createElement("td");
        tdInv.style.textAlign = "center";
        const invWrap = document.createElement("div");
        invWrap.className = "tick";
        invWrap.appendChild(invoiced);
        tdInv.appendChild(invWrap);
        tr.appendChild(tdInv);

        const tdEmail = document.createElement("td");
        tdEmail.style.textAlign = "center";
        const emailWrap = document.createElement("div");
        emailWrap.className = "tick";
        emailWrap.appendChild(emailed);
        tdEmail.appendChild(emailWrap);
        tr.appendChild(tdEmail);

        invoiced.addEventListener("change", updateTotals);
        emailed.addEventListener("change", updateTotals);

        bodyRows.appendChild(tr);
      }

      updateTotals();
    }

    buildRows();

    document.getElementById("exportBtn").addEventListener("click", () => {
      if (typeof XLSX === "undefined") {
        alert("Excel library not loaded.");
        return;
      }

      const rows = [[
        "Row","Time","Customer","Invoice","Payment","Amount","Job Type","Vehicle","Rego","Inv","Email"
      ]];

      document.querySelectorAll("#runsheet tbody tr").forEach((tr, i) => {
        const cells = tr.querySelectorAll("input, select");
        rows.push([
          i + 1,
          cells[0].value,
          cells[1].value,
          cells[2].value,
          cells[3].value,
          cells[4].value,
          cells[5].value,
          cells[6].value,
          cells[7].value,
          cells[8].checked ? "YES" : "",
          cells[9].checked ? "YES" : ""
        ]);
      });

      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Run Sheet");
      XLSX.writeFile(wb, "runsheet.xlsx");
    });

    let deferredPrompt = null;

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log("Install prompt ready");
    });

    document.getElementById("installBtn").addEventListener("click", async () => {
      if (!deferredPrompt) {
        const regs = await navigator.serviceWorker.getRegistrations();
        alert(
          "Install prompt not available.\n\n" +
          "Controller: " + !!navigator.serviceWorker.controller + "\n" +
          "Registrations: " + regs.length + "\n" +
          "Scopes:\n" + regs.map(r => r.scope).join("\n")
        );
        return;
      }

      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
    });

    document.getElementById("resetSwBtn").addEventListener("click", async () => {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) {
        await r.unregister();
      }

      const keys = await caches.keys();
      for (const k of keys) {
        await caches.delete(k);
      }

      alert("Service Worker Reset");
      location.reload();
    });
  </script>
</body>
</html>
